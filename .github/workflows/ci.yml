name: api-ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Configure env
        run: |
          cp .env.example .env
          echo "APP_KEY=$(openssl rand -base64 32)" >> .env
          echo "RIOT_API_KEY=ci-dummy" >> .env
          echo "DISCORD_CLIENT_ID=ci-dummy" >> .env
          echo "DISCORD_CLIENT_SECRET=ci-dummy" >> .env
          echo "DB_PASSWORD=" >> .env
          echo "INTERNAL_API_KEY=ci-dummy" >> .env
      - run: node ace migration:run
      - run: pnpm typecheck
      - run: node ace test functional
